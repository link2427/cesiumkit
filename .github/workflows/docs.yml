name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ".[dev,docs]" coverage-badge
      - run: pytest --cov=cesiumkit --cov-report=term
      - run: coverage-badge -o docs/coverage.svg -f
      - run: mkdocs gh-deploy --force
