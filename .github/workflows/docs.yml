name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ".[dev,docs,gis]" genbadge[coverage]
      - run: pytest --cov=cesiumkit --cov-report=xml
      - run: genbadge coverage -i coverage.xml -o docs/coverage.svg

      # Pull the latest gallery screenshots from the gallery-images branch
      # so they're included in the built docs site. The gallery branch is
      # populated by .github/workflows/gallery.yml (manual / on release).
      - name: Fetch gallery images
        run: |
          mkdir -p docs/images/gallery
          if git fetch origin gallery-images 2>/dev/null; then
            git show origin/gallery-images:docs/images/gallery 2>/dev/null | true
            git --work-tree=. checkout origin/gallery-images -- docs/images/gallery 2>/dev/null || echo "No gallery images yet"
          else
            echo "gallery-images branch does not exist yet — skipping"
          fi

      - run: mkdocs gh-deploy --force
