name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ".[dev,docs]" genbadge[coverage]
      - run: pytest --cov=cesiumkit --cov-report=xml
      - run: genbadge coverage -i coverage.xml -o docs/coverage.svg
      - run: mkdocs gh-deploy --force
