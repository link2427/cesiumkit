site_name: cesiumkit
site_url: https://link2427.github.io/cesiumkit
site_description: Build CesiumJS 3D globe visualizations entirely in Python.
repo_url: https://github.com/link2427/cesiumkit
repo_name: link2427/cesiumkit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - GeoPandas & Shapely: getting-started-gis.md
  - Gallery: gallery.md
  - Examples: examples.md
  - API Reference:
      - Viewer: api/viewer.md
      - Entity: api/entities.md
      - Coordinates & Math: api/coordinates.md
      - Color: api/color.md
      - Materials: api/materials.md
      - Camera: api/camera.md
      - Properties: api/properties.md
      - Data Sources: api/datasources.md
      - Imagery Providers: api/imagery.md
      - Terrain Providers: api/terrain.md
      - Scene & Globe: api/scene.md
      - Enums: api/enums.md
      - Ion: api/ion.md
      - CZML Export: api/czml.md
      - Clock & Time: api/clock.md
      - Events: api/events.md
      - GIS Integration: api/gis.md
      - Utilities: api/utils.md
